<!DOCTYPE html>
<!-- ============================================================
  오름AI 부동산 v52
  ============================================================
  [v51 변경사항]
  - BUG FIX: agentRole defaultValue:'' → profile.agentRole (My페이지 직함 미반영)
  - BUG FIX: ai-edit-customer 저장 시 document.querySelectorAll → aiFormRef + data-acfield 패턴으로 교체
  - BUG FIX: detail/share/customer-detail 화면 — dp/dp2/cd undefined 크래시 가드 추가
  - BUG FIX: detail 편집 roomsbaths 단일 필드 → data-field:'rooms' 로 수정 (floor 별도 표시)
  - BUG FIX: detail addr+floor 합쳐서 저장되던 문제 → addr만 input, floor는 텍스트 표시
  - BUG FIX: noti 알림 클릭 시 propIdx 범위 체크 추가 (P.length 초과 방지)
  - CLEANUP: My페이지 완료 후 불필요한 setScreen(s=>s) 제거
  - DESIGN: border-radius 전체 축소 (14→10px, 12→8px, 10→6px) — 토스/카뱅 수준 전문감
  ============================================================
  ============================================================
  [화면 구조]
  home        : 검색창 하나 (구글 스타일) + 하단 녹음 FAB
  home+search : 통합 검색 결과 (매물 + 고객)
  voice       : 녹음 / 텍스트 입력
  ai-loading  : AI 분석 중
  detail      : 매물 상세 (편집 포함)
  share       : 매물 공유
  customer-detail : 고객 상세 (이름+전화+메모만)
  ai-edit-customer: 고객 AI 파싱 확인
  noti        : 알림
  my          : 마이페이지
  login/card-* : 온보딩

  [TODO: Supabase 연결 포인트]
  - TODO-AUTH, TODO-DB-P, TODO-DB-C, TODO-DB-NOTI
  - TODO-AI, TODO-STORAGE
  - TODO-SAVE-P, TODO-UPDATE-P, TODO-DELETE-P
  - TODO-SAVE-C, TODO-UPDATE-C, TODO-DELETE-C
  - TODO-RLS, TODO-SUB
  ============================================================ -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>오름AI 부동산</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
/* ── 1. CSS 변수 ── */
:root{
  --orange:#F05A28;--orange-light:#FFF4EE;--orange-gradient:linear-gradient(135deg,#F05A28,#FF8A5C);
  --green:#34C759;--green-light:#F0FAF3;--blue:#4A90D9;--blue-light:#F0F5FF;
  --bg:#F5F6F8;--card:#FFFFFF;--text:#1C1C28;--text-secondary:#8891A0;--border:#E8ECF0;--radius:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;overscroll-behavior:none}
body{font-family:'Noto Sans KR',sans-serif;background:#fff;min-height:100vh;min-height:100dvh}

/* ── 2. 앱 쉘 ── */
.app-shell{width:100%;height:100vh;height:100dvh;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column}
.notch{display:none}
.status-bar{display:none}

@media(min-width:500px){
  body{background:#ECEDF0;display:flex;align-items:center;justify-content:center;padding:20px 0;min-height:100vh}
  .app-shell{width:375px;height:812px;max-height:calc(100vh - 40px);border-radius:40px;box-shadow:0 24px 60px rgba(0,0,0,.12),0 0 0 2px #2A2A2A,0 0 0 6px #3A3A3A,0 0 0 8px #2A2A2A}
  .notch{display:block;position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:32px;background:#222;border-radius:20px;z-index:50}
  .status-bar{display:flex;height:54px;padding:14px 24px 0;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;position:relative;z-index:40;flex-shrink:0}
  .status-bar .time{font-size:14px;font-weight:700}
  .status-bar .icons{display:flex;gap:5px;font-size:11px}
}

/* ── 3. 공통 레이아웃 ── */
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 20px;flex-shrink:0;position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border);min-height:44px}
.top-bar button{width:36px;height:36px;border-radius:8px;border:none;background:var(--bg);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative}
.noti-badge{position:absolute;top:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:#EF4444;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}
.content-area{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;overscroll-behavior:contain}
.content-area::-webkit-scrollbar{display:none}
.m-back-bar{display:flex;align-items:center;gap:8px;padding:8px 20px;flex-shrink:0}
.m-back-bar button{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;color:var(--text)}
.m-back-bar h1{font-size:18px;font-weight:700}

/* ── 4. 홈 화면 ── */
.home-wrap{display:flex;flex-direction:column;height:100%}
.home-header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 0;flex-shrink:0}
.home-logo{display:flex;align-items:center;gap:8px}
.home-logo-icon{width:32px;height:32px;border-radius:6px;background:var(--orange-gradient);display:flex;align-items:center;justify-content:center}
.home-logo-text{font-size:16px;font-weight:800;color:var(--text)}
.home-header-btns{display:flex;gap:8px}
.home-header-btns button{width:36px;height:36px;border-radius:8px;border:none;background:var(--bg);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative}

/* 검색창 */
.search-zone{padding:20px 20px 0;flex-shrink:0}
.search-box{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:28px;border:1.5px solid var(--border);background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.06);transition:border .2s,box-shadow .2s}
.search-box.focused{border-color:var(--orange);box-shadow:0 2px 16px rgba(240,90,40,.15)}
.search-box input{flex:1;border:none;outline:none;font-size:15px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:transparent}
.search-box input::placeholder{color:var(--text-secondary)}
.search-icon{font-size:18px;color:var(--text-secondary);flex-shrink:0}
.search-clear{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-secondary);padding:0;flex-shrink:0}

/* 홈 빈 상태 */
.home-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 20px 100px;text-align:center}
.home-empty-hint{font-size:13px;color:var(--text-secondary);line-height:1.8;margin-top:16px}
/* 통합 검색 결과 */
.search-results{flex:1;overflow-y:auto;scrollbar-width:none;padding:12px 20px 100px}
.search-results::-webkit-scrollbar{display:none}
.result-section-title{font-size:12px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.result-section-title:first-child{margin-top:0}
/* ── 5. FAB 녹음 버튼 ── */
.fab-mic{position:absolute;bottom:calc(28px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);width:64px;height:64px;border-radius:50%;background:var(--orange-gradient);border:none;font-size:28px;color:#fff;cursor:pointer;z-index:50;box-shadow:0 8px 24px rgba(240,90,40,.4);display:flex;align-items:center;justify-content:center;transition:transform .2s}
@media(min-width:500px){.fab-mic{bottom:28px}}
.fab-mic:active{transform:translateX(-50%) scale(.9)}

/* ── 6. 매물 카드 (리스트용) ── */
.property-list{display:flex;flex-direction:column;gap:10px}
.property-item{display:flex;gap:12px;padding:12px;border-radius:var(--radius);background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .15s;position:relative}
.property-item:active{transform:scale(.98)}
.prop-thumb{width:72px;height:72px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--orange-light);display:flex;align-items:center;justify-content:center;font-size:28px;position:relative}
.prop-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.prop-photo-count{position:absolute;bottom:3px;right:3px;background:rgba(0,0,0,.55);color:#fff;font-size:9px;font-weight:700;padding:2px 4px;border-radius:4px}
.prop-info{flex:1;min-width:0}
.prop-name{font-size:14px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prop-addr{font-size:11px;color:var(--text-secondary);margin-bottom:4px}
.prop-price{font-size:14px;font-weight:800;color:var(--orange)}
.prop-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.tag{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600}
.tag-type{background:#F3F4F6;color:#4B5563}
.tag-commercial{background:#FFF0F3;color:#E0335A}
.tag-done{background:var(--green-light);color:var(--green)}
.tag-draft{background:var(--blue-light);color:var(--blue)}
.item-del-btn{position:absolute;top:8px;right:8px;width:20px;height:20px;border-radius:50%;border:none;background:#E8ECF0;color:#8891A0;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5}

/* ── 7. 고객 카드 (리스트용) ── */
.customer-list{display:flex;flex-direction:column;gap:8px}
.customer-item{display:flex;gap:12px;padding:12px;border-radius:var(--radius);background:var(--card);border:1px solid var(--border);cursor:pointer;align-items:center;transition:all .15s;position:relative}
.customer-item:active{transform:scale(.98)}
.customer-avatar{width:40px;height:40px;border-radius:50%;background:var(--orange-gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0}
.customer-info{flex:1;min-width:0}
.customer-name{font-size:14px;font-weight:700}
.customer-phone{font-size:12px;color:var(--text-secondary);margin-top:1px}
.customer-memo-preview{font-size:11px;color:var(--text-secondary);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── 8. 녹음 화면 ── */
.voice-wrap{display:flex;flex-direction:column;height:100%}
.voice-area{display:flex;flex-direction:column;align-items:center;padding:20px 20px 12px}
.recording-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;background:var(--orange);color:#fff;font-size:12px;font-weight:600;margin-bottom:16px}
.rec-dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.rec-btn-wrap{position:relative;margin-bottom:12px;width:150px;height:150px;display:flex;align-items:center;justify-content:center}
.rec-pulse{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:2px solid rgba(240,90,40,.15);animation:pulse 2s infinite}
.rec-pulse.p1{width:120px;height:120px}.rec-pulse.p2{width:150px;height:150px;animation-delay:.5s}
@keyframes pulse{0%{transform:translate(-50%,-50%) scale(.9);opacity:.6}100%{transform:translate(-50%,-50%) scale(1.1);opacity:0}}
.rec-btn{width:96px;height:96px;border-radius:50%;background:var(--orange-gradient);border:none;font-size:36px;color:#fff;cursor:pointer;box-shadow:0 10px 40px rgba(240,90,40,.35);position:relative;z-index:2;display:flex;align-items:center;justify-content:center}
.rec-hint{text-align:center;font-size:12px;color:var(--text-secondary);line-height:1.7}
.voice-text-area{flex:1;padding:0 20px 12px;display:flex;flex-direction:column}
.voice-text-area textarea{width:100%;padding:14px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;font-family:'Noto Sans KR',sans-serif;line-height:1.7;flex:1;resize:none;outline:none;color:var(--text);box-sizing:border-box;transition:border .2s}
.voice-text-area textarea:focus{border-color:var(--orange)}
.voice-actions{display:flex;gap:12px;padding:10px 20px;padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));background:#fff;border-top:1px solid var(--border);flex-shrink:0}
@media(min-width:500px){.voice-actions{padding-bottom:10px}}
.btn-cancel-v{flex:1;padding:13px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--text-secondary)}
.btn-convert{flex:1.5;padding:13px;border-radius:8px;border:none;background:var(--orange);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

/* ── 9. AI 로딩 ── */
.ai-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:500px;padding:40px 20px;text-align:center}
.ai-spinner{width:80px;height:80px;border-radius:50%;background:var(--orange-gradient);display:flex;align-items:center;justify-content:center;font-size:36px;animation:spinPulse 1.5s ease-in-out infinite;margin-bottom:24px}
@keyframes spinPulse{0%{transform:scale(1);box-shadow:0 0 0 0 rgba(240,90,40,.4)}50%{transform:scale(1.1);box-shadow:0 0 0 20px rgba(240,90,40,0)}100%{transform:scale(1);box-shadow:0 0 0 0 rgba(240,90,40,0)}}
.ai-loading-text{font-size:18px;font-weight:700;margin-bottom:8px}
.ai-loading-sub{font-size:13px;color:var(--text-secondary);line-height:1.6}
.ai-progress-bar{width:200px;height:4px;background:var(--border);border-radius:2px;margin-top:20px;overflow:hidden}
.ai-progress-fill{height:100%;background:var(--orange-gradient);border-radius:2px;animation:progressAnim 2s ease-in-out forwards}
@keyframes progressAnim{0%{width:0}30%{width:40%}60%{width:70%}90%{width:90%}100%{width:100%}}

/* ── 10. 매물 상세 ── */
.detail-hero{background:linear-gradient(135deg,var(--orange-light),#FAFBFC);height:200px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center}
.detail-hero .emoji{font-size:52px;margin:8px 0}
.detail-body{padding:18px 20px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.info-cell{padding:12px;background:var(--bg);border-radius:8px}
.info-cell .label{font-size:11px;color:var(--text-secondary);margin-bottom:3px;font-weight:500}
.info-cell .value{font-size:14px;font-weight:700}
.memo-title{font-size:13px;font-weight:700;margin-bottom:6px}
.owner-card{padding:14px;background:var(--bg);border-radius:var(--radius);margin-bottom:18px;border-left:3px solid var(--orange)}
.owner-label{color:var(--text-secondary);font-size:11px}
.detail-action-bar{display:flex;gap:10px;padding:10px 20px;background:#fff;border-top:1px solid var(--border);flex-shrink:0}
.btn-share{flex:1;padding:13px;border-radius:8px;border:none;background:var(--orange);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

/* 인라인 편집 필드 */
.fi{width:100%;border:1.5px solid transparent;background:transparent;outline:none;font-family:'Noto Sans KR',sans-serif;color:var(--text);border-radius:6px;padding:6px 8px;transition:border .15s;pointer-events:none;cursor:default}
.fi.on{border-color:var(--border);background:#fff;pointer-events:auto;cursor:text}
.fi.on:focus{border-color:var(--orange)}
.fi:not(.on)::placeholder{color:transparent}
.fi-ta:not(.on)::placeholder{color:transparent}
.fi-owner-ta:not(.on)::placeholder{color:transparent}
.fi-name{font-size:20px;font-weight:800;line-height:1.3;display:block}
.fi-price{font-size:26px;font-weight:800;color:var(--orange);line-height:1.2;display:block}
.fi-addr{font-size:13px;font-weight:600;flex:1}
.fi-val{font-size:14px;font-weight:700;display:block}
.fi-small{font-size:13px;font-weight:700;display:block;width:auto;padding:2px 4px}
.fi-ta{width:100%;border:1.5px solid transparent;background:transparent;outline:none;font-family:'Noto Sans KR',sans-serif;color:var(--text);resize:none;line-height:2;border-radius:6px;padding:14px 16px;transition:border .15s;overflow:visible;pointer-events:none;cursor:default;font-size:14px;min-height:200px}
.fi-ta.on{border-color:var(--border);background:#fff;padding:12px 14px;min-height:260px;pointer-events:auto;cursor:text}
.fi-ta.on:focus{border-color:var(--orange)}
.fi-owner-ta{width:100%;border:1.5px solid transparent;background:transparent;outline:none;font-family:'Noto Sans KR',sans-serif;color:var(--text-secondary);resize:none;line-height:1.7;border-radius:6px;padding:6px 0;transition:border .15s;overflow:hidden;pointer-events:none;cursor:default;font-size:12px;min-height:50px}
.fi-owner-ta.on{border-color:var(--border);background:#fff;padding:8px 10px;pointer-events:auto;cursor:text}
.fi-owner-ta.on:focus{border-color:var(--orange)}

/* 헤더 오렌지 버튼 (편집/완료 공통) */
.btn-hdr{padding:6px 14px;border-radius:6px;border:none;background:var(--orange);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}

/* ── 11. 고객 상세 (단순) ── */
.cd-wrap{padding:20px;padding-bottom:100px}
.cd-profile{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.cd-avatar{width:52px;height:52px;border-radius:50%;background:var(--orange-gradient);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;flex-shrink:0}
.cd-contact-btn{display:flex;gap:8px;margin-bottom:20px}
.cd-btn{flex:1;padding:10px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.cd-memo-section{margin-bottom:20px}
.cd-memo-title{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--text)}
.cd-memo-box{border-left:3px solid var(--orange);border-radius:8px;background:var(--bg)}

/* ── 12. 공유 화면 ── */
.carousel-wrap{position:relative;margin:0 20px 14px;border-radius:var(--radius);overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1);background:#1a1a1a}
.carousel-track{display:flex;transition:transform .3s ease}
.slide{flex:0 0 100%;position:relative}
.slide-img{width:100%;height:200px;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#1a1a1a}
.slide-img img{width:100%;height:100%;object-fit:cover}
.slide-label{position:absolute;bottom:10px;left:10px;padding:3px 10px;border-radius:6px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;font-weight:600}
.slide-num{position:absolute;top:10px;right:10px;padding:3px 8px;border-radius:6px;background:rgba(0,0,0,.5);color:#fff;font-size:10px;font-weight:700}
.carousel-dots{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:5}
.carousel-dots .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.45);cursor:pointer;transition:all .2s}
.carousel-dots .dot.active{background:#fff;width:18px;border-radius:3px}
.biz-card-w{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;margin:0 20px 14px;background:#fff;border-radius:var(--radius);border:1px solid var(--border);border-left:3px solid var(--orange)}
.biz-left{display:flex;align-items:center;gap:10px}
.biz-logo-w{width:34px;height:34px;border-radius:8px;background:var(--orange-gradient);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
.biz-name-t{font-size:13px;font-weight:800}.biz-title-t{font-size:11px;color:var(--text-secondary)}
.biz-right{text-align:right}
.biz-contact-t{font-size:11px;font-weight:700;line-height:1.6}
.biz-org{font-size:10px;color:var(--text-secondary);margin-top:1px}
.share-actions-row{padding:0 20px 80px;display:flex;gap:10px}
.share-btn-w{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.share-btn-w:active{background:var(--bg)}
.share-icon-w{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px}
.share-icon-w.kakao{background:#FEE500}.share-icon-w.sms-s{background:var(--green);color:#fff}
.share-title{font-size:12px;font-weight:700}

function normalizeSearch(s){
  if(!s)return '';
  s=s.replace(/\s+/g,''); // 공백 제거
  s=s.replace(/(\d+)억(\d+)천/g,function(_,a,b){return String(Number(a)*10000+Number(b)*1000);});
  s=s.replace(/(\d+)억/g,function(_,a){return String(Number(a)*10000);});
  s=s.replace(/(\d+)천(\d+)/g,function(_,a,b){return String(Number(a)*1000+Number(b));});
  s=s.replace(/(\d+)천/g,function(_,a){return String(Number(a)*1000);});
  s=s.replace(/(\d+)만/g,function(_,a){return String(Number(a)*10000);});
  return s.toLowerCase();
}

function formatPhone(v){
  var d=v.replace(/\D/g,'').slice(0,11);
  if(d.length<4)return d;
  if(d.length<8)return d.slice(0,3)+'-'+d.slice(3);
  return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);
}
var onPhoneInput=function(e){
  var fmt=formatPhone(e.target.value);
  if(fmt!==e.target.value)e.target.value=fmt;
};

    shareModal?h('div',{className:'del-overlay',onClick:function(){setShareModal(false);}},

        h('div',{style:{padding:'16px 20px 10px',borderBottom:'1px solid var(--border)',flexShrink:0}},
          h('div',{style:{fontSize:15,fontWeight:800,marginBottom:10}},'📨 문자 보낼 고객 선택'),
          h('div',{style:{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',borderRadius:20,border:'1.5px solid var(--border)',background:'#fff'}},
            h('span',{style:{fontSize:15,color:'var(--text-secondary)'}},'🔍'),
            h('input',{
              autoFocus:true,
              type:'text',
              placeholder:'고객 이름 검색',
              value:shareQ,
              onChange:function(e){setShareQ(e.target.value);},
              style:{border:'none',outline:'none',flex:1,fontSize:14,fontFamily:'Noto Sans KR,sans-serif',color:'var(--text)'}
            })
          )
        ),
        h('div',{style:{overflowY:'auto',flex:1,padding:'8px 0'}},
          (shareQ.trim()===''?C:C.filter(function(c){return c.name.includes(shareQ.trim())||c.phone.includes(shareQ.trim());})).length===0
            ? h('div',{style:{textAlign:'center',padding:'30px 0',fontSize:13,color:'var(--text-secondary)'}},'검색 결과가 없습니다')
            : (shareQ.trim()===''?C:C.filter(function(c){return c.name.includes(shareQ.trim())||c.phone.includes(shareQ.trim());})).map(function(c,i){
                return h('a',{
                  key:i,
                  href:'sms:'+c.phone+'?body='+encodeURIComponent('[오름AI 매물]\n'+(P[selProp]?P[selProp].name+'\n'+P[selProp].addr+'\n'+P[selProp].deal+' '+P[selProp].price:'')+'\n\n📱 '+profile.mobile),
                  style:{display:'flex',alignItems:'center',gap:12,padding:'12px 20px',textDecoration:'none',color:'var(--text)',borderBottom:'1px solid var(--border)'},
                  onClick:function(){setShareModal(false);}
                },
                  h('div',{style:{width:36,height:36,borderRadius:'50%',background:'var(--orange-gradient)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:800,fontSize:14,flexShrink:0}},c.name[0]),
                  h('div',null,
                    h('div',{style:{fontSize:14,fontWeight:700}},c.name),
                    h('div',{style:{fontSize:12,color:'var(--text-secondary)',marginTop:1}},c.phone)
                  )
                );
              })
        )
      )
    ):null,
    delModal?h('div',{className:'del-overlay',onClick:function(){setDelModal(null);}},
      h('div',{className:'del-sheet',onClick:function(e){e.stopPropagation();}},
        h('div',{className:'del-icon'},'🗑️'),
        h('div',{className:'del-title'},delModal.title),
        h('div',{className:'del-name'},'「'+delModal.name+'」'),
        h('div',{className:'del-warn'},'삭제 후 복구할 수 없습니다'),
        h('div',{className:'del-btns'},
          h('button',{className:'del-btn-cancel',onClick:function(){setDelModal(null);}},'취소'),
          h('button',{className:'del-btn-ok',onClick:function(){delModal.onOk();setDelModal(null);}},'삭제')
        )
      )
    ):null
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
